<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sonic Garden</title>

  <!-- p5.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <!-- p5 sound -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
</head>

<body>
<script>

// ============================================
// CONFIG
// ============================================
const CONFIG = {
  plants: {
    initial: 5,
    max: 12,
    growInterval: 30
  },
  terrain: {
    detail: 100,
    minHeight: 150,
    maxHeight: 50,
    noiseScale: 0.05
  },
  audio: {
    growThreshold: 0.1
  }
};

// ============================================
// GLOBALS
// ============================================
let mic;
let micStarted = false;
let plants = [];
let terrain = [];
let micLevel = 0;

// ============================================
// SETUP & DRAW
// ============================================
function setup() {
  createCanvas(windowWidth, windowHeight);
  generateTerrain();
  initializePlants();
}

function draw() {
  drawSky();

  micLevel = (mic && micStarted) ? mic.getLevel() : 0;

  drawTerrain();

  for (let i = plants.length - 1; i >= 0; i--) {
    plants[i].update(micLevel);
    plants[i].display();
  }
}

// ============================================
// INIT
// ============================================
function initializePlants() {
  for (let i = 0; i < CONFIG.plants.initial; i++) {
    const x = random(width * 0.2, width * 0.8);
    const y = getTerrainHeightAt(x);
    plants.push(new Plant(x, y));
  }
}

function generateTerrain() {
  terrain = [];
  const offset = random(1000);

  for (let i = 0; i <= CONFIG.terrain.detail; i++) {
    const x = map(i, 0, CONFIG.terrain.detail, 0, width);
    const y = map(
      noise(i * CONFIG.terrain.noiseScale + offset),
      0, 1,
      height - CONFIG.terrain.minHeight,
      height - CONFIG.terrain.maxHeight
    );
    terrain.push(createVector(x, y));
  }
}

// ============================================
// DRAW
// ============================================
function drawSky() {
  for (let y = 0; y < height; y++) {
    const c = lerpColor(
      color(135, 206, 250),
      color(255, 182, 193),
      y / height
    );
    stroke(c);
    line(0, y, width, y);
  }
}

function drawTerrain() {
  fill(101, 67, 33);
  noStroke();

  beginShape();
  terrain.forEach(v => vertex(v.x, v.y));
  vertex(width, height);
  vertex(0, height);
  endShape(CLOSE);
}

function getTerrainHeightAt(x) {
  const i = floor(map(x, 0, width, 0, terrain.length - 1));
  return terrain[constrain(i, 0, terrain.length - 1)].y;
}

// ============================================
// EVENTS
// ============================================
function mousePressed() {
  // 🔥 FIX: Start mic only after user click
  if (!micStarted) {
    userStartAudio();

    mic = new p5.AudioIn();
    mic.start();

    micStarted = true;
    console.log("Mic started");
  }

  if (plants.length < CONFIG.plants.max) {
    plants.push(new Plant(mouseX, getTerrainHeightAt(mouseX)));
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  generateTerrain();
}

// ============================================
// PLANT CLASS
// ============================================
class Plant {
  constructor(x, y) {
    this.pos = createVector(x, y);
    this.sentence = "X";
    this.rules = {
      "X": "F+[[X]-X]-F[-FX]+X",
      "F": "FF"
    };
    this.len = 3;
    this.angle = 25;
    this.gen = 0;
    this.maxGen = 5;
    this.lastGrow = 0;
  }

  update(micLevel) {
    const canGrow =
      micLevel > CONFIG.audio.growThreshold &&
      this.gen < this.maxGen &&
      frameCount - this.lastGrow > CONFIG.plants.growInterval;

    if (canGrow) {
      this.grow();
      this.lastGrow = frameCount;
    }
  }

  grow() {
    let next = "";
    for (let c of this.sentence) {
      next += this.rules[c] || c;
    }
    this.sentence = next;
    this.gen++;
  }

  display() {
    push();
    translate(this.pos.x, this.pos.y);
    stroke(100, 200, 100);

    for (let c of this.sentence) {
      if (c === "F") {
        line(0, 0, 0, -this.len);
        translate(0, -this.len);
      } else if (c === "+") {
        rotate(radians(this.angle));
      } else if (c === "-") {
        rotate(radians(-this.angle));
      } else if (c === "[") {
        push();
      } else if (c === "]") {
        pop();
      }
    }

    pop();
  }
}

</script>
</body>
</html>
